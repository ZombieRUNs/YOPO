# Collect SUPER trajectory dataset
# Mirrors collect_gcopter_trajs.yaml but targets the SUPER planner.
# Run from YOPO/run/ (inside Docker):
#   python collect_super_trajs.py
#   python collect_super_trajs.py --num_scenes=2 --trajs_per_scene=5   # quick test

num_scenes:      36        # reuse all 36 YOPO dataset scenes
trajs_per_scene: 20

# Input: existing gcopter_trajs dataset (contains pointcloud.ply per scene)
gcopter_trajs_root: dataset/gcopter_trajs

# Output
save_root: dataset/super_trajs_v1

# Depth + RGB resolution
img_width:  160
img_height: 96

# Start/goal Euclidean distance constraints (meters).
# SUPER planning_horizon=7m so goals farther away trigger replanning;
# trajectories in the dataset are the first-segment plans (~7m).
min_dist: 30.0
max_dist: 40.0

rgb_fps: 30.0

# Extra pitch applied after the body attitude has been reconstructed.
# This is a render-only camera/view adjustment in degrees:
#   0    -> keep the recovered body attitude unchanged
#   -15  -> look slightly downward, matching the common PX4 render setup
# The value is converted to a quaternion and right-multiplied onto the
# recovered render attitude inside collect_images().
camera_pitch_deg: -15.0

# Render-time attitude reconstruction.
# `explicit_flatness` makes the geometry in collect_super_trajs.py explicit:
# position/velocity/acceleration/yaw -> R_wb -> quaternion.
# `gcopter_flatmap` keeps the legacy GCOPTER helper:
#   flatmap.forward(vel, acc, jer, psi, 0) -> thrust, quat, body_rate
attitude_solver: explicit_flatness

# Whether the explicit flatness solver should include drag compensation when
# recovering body z-axis from reference acceleration.
# true:
#   b3 ~ normalize(a_ref + g e3 + drag_acc)
# false:
#   b3 ~ normalize(a_ref + g e3)
# 建议保留 true，这样显式 flatness 解与现有 GCOPTER FlatnessMap 更接近。
flatness_use_drag: true

# EMA-based smooth perturbation. This does not modify SUPER's executed command
# trace saved in waypoints.npy; it only affects the render-time state used to
# generate image observations and the extra render_*.npy debug files.
# 也就是说：
# - waypoints.npy 仍然保存 SUPER 实际执行的 p/v/a/j 轨迹
# - EMA 只作用在 Flightmare 渲染时送入 env.setState() 的姿态恢复链
# - 因而不会篡改原始执行轨迹记录，但会改变 depth/RGB 的时序分布
ema_enable: true

# Each trajectory samples one beta per parameter stream, then keeps that beta
# fixed for all time steps of that trajectory.
# Update rule:
#   ema_new = beta * current_sample + (1 - beta) * ema_prev
# Smaller beta -> slower drift, stronger temporal correlation.
# Larger beta  -> faster response, closer to per-step random sampling.
ema_beta_min: 0.01
ema_beta_max: 0.10

# Relative sampling range for HorizDrag before EMA smoothing.
# Example: base HorizDrag = 0.70, rel = 0.15
# -> raw samples are drawn from [0.595, 0.805], then EMA-smoothed over time.
# This affects the drag-compensated flatness attitude recovery only.
ema_horiz_drag_rel: 0.15

# Relative sampling range for VertDrag before EMA smoothing.
# Same mechanism as ema_horiz_drag_rel, but applied to the vertical drag term.
ema_vert_drag_rel: 0.15

# Relative sampling range for render-time velocity scale before EMA smoothing.
# This does not change the saved waypoint velocity in waypoints.npy.
# Instead, it perturbs the velocity used during:
#   1. yaw extraction  psi = atan2(vy, vx) + yaw_bias
#   2. render-time flatness attitude recovery
#   3. env.setState(pos, vel_render, acc, quat)
# So this parameter mainly changes the rendered image distribution and the
# smoothness of the visual motion cues.
ema_vel_scale_rel: 0.10

# --- SUPER-specific ---

# Seconds to wait after odometry appears for ROG-Map to finish loading PCD.
# ~3M-point clouds at 0.1m resolution take 5-10s on typical hardware.
startup_wait: 10.0

# Seconds to wait for /planning_cmd/poly_traj after sending /goal.
plan_timeout: 15.0

# Extra buffer (seconds) added after each replan segment before goal-distance check.
exec_buffer: 2.0

# Consider one trajectory complete when odometry is within this distance to goal.
goal_reach_dist: 0.5

# Max wall-clock seconds allowed for one goal (across multiple replans).
goal_timeout: 60.0

# Max number of /planning_cmd/poly_traj segments to stitch for one saved trajectory.
max_replan_segments: 20

# Teleport drone to a fresh random start position every N trajectories
# to ensure scene-wide coverage (otherwise trajectories chain from goal to goal).
reset_interval: 5

# Clamp all sampled init/start/goal z to a safe fixed flight height for SUPER.
# Avoids goals near virtual_ceil_height causing corridor generation failure.
safe_flight_z: 1.5

# Override SUPER planner safety radius (super_planner.robot_r) before each scene launch.
# Use 0.3 for conservative clearance in dense trees.
super_robot_r: 0.3

# Override SUPER max velocity (super_planner.boundary.max_vel) before each scene launch.
# Default in click_smooth_ros1.yaml is 5.0 m/s.
super_max_vel: 3.0

# Occupancy check radius used for start/goal sampling only (not post-execution filter).
# SUPER's own planner guarantees obstacle avoidance; PLY-based post-execution check
# produces false rejections because PLY geometry is denser than SUPER's ROG-Map voxels.
collision_check_r: 0.3
