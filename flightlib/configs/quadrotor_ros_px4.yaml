main_loop_freq: 30
unity_render: yes
scene_id: 0                             # 0 wasteland, 1 japanese street, 4 empty forest in standalone (SR)
odom_topic: /mavros/local_position/odom
quad_size: 0.1
ply_path: "/flightrender/RPG_Flightmare/pointcloud_data/"

rgb_camera_left:
  on: yes
  t_BC: [0.0, 0.0, 0.1]
  r_BC: [0.0, -5.0, -90]
  width: 160
  height: 90
  fov: 90.0
  enable_depth: yes
  enable_segmentation: no
  enable_opticalflow: no

rgb_camera_right:
  on: no
  t_BC: [0.0, -0.2, 0.1]
  r_BC: [0.0, -5.0, -90]

unity:
  spawn_trees: false
  save_pointcloud: false
  avg_tree_spacing: 4.0
  bounding_box: [80.0, 80.0, 11.0]
  bounding_box_origin: [-10, 20, 2.5]
  pointcloud_resolution: 0.2
